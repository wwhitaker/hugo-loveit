{{- $user := .Get "user" | default .Site.Params.social.GitHub -}}
{{- if $user -}}
<div class="github-contrib-calendar">
  <h2>Contributions</h2>
  <a class="calendar-link" href="https://github.com/{{ $user }}" target="_blank" rel="noopener noreferrer" aria-label="View {{ $user }} on GitHub">
    <img
      class="calendar-image calendar-image-light"
      src="https://ghchart.rshah.org/2da44e/{{ $user }}"
      alt="GitHub contributions calendar for {{ $user }}"
      loading="lazy"
      decoding="async"
    >
    <img
      class="calendar-image calendar-image-dark"
      src="https://ghchart.rshah.org/39d353/{{ $user }}"
      alt="GitHub contributions calendar for {{ $user }}"
      loading="lazy"
      decoding="async"
    >
  </a>
</div>
{{- end -}}
